# OpenAPI drift detection.
#
# Two jobs run on different triggers:
#   - check-pr:   pull_request → on drift, auto-regenerates docs/openapi.yaml and
#                 pushes the regenerated spec back to the PR branch (same-repo PRs
#                 only). Fork PRs fall back to a comment asking the contributor to
#                 run `rake openapi:regen` locally, since GITHUB_TOKEN is read-only
#                 on forks.
#   - regen-main: push to main → regenerates docs/openapi.yaml and opens an auto-PR
#                 when drift is detected. Should be rare; PRs are expected to catch
#                 drift before it lands on main.
#
# Required permissions (granted at the workflow level below):
#   contents: write       — check-pr pushes regen commits to the PR branch;
#                           regen-main commits the regenerated spec to a new branch.
#   pull-requests: write  — both jobs comment on / open PRs.
#
# A note on re-triggers: commits pushed by GITHUB_TOKEN do not re-trigger workflows
# (GitHub security rule). The auto-regen commit therefore won't kick off another
# CI run. For openapi-drift this is fine — docs/openapi.yaml is generated content
# and doesn't affect runtime behavior, so skipping re-CI is safe. If you ever need
# the regen to retrigger downstream workflows, swap GITHUB_TOKEN for a PAT or a
# GitHub App token.
name: OpenAPI drift

on:
  pull_request:
    paths:
      - "app/controllers/api/v2/**"
      - "app/models/**"
      - "config/routes.rb"
      - "script/openapi/**"
      - "lib/tasks/openapi.rake"
      - ".github/workflows/openapi-drift.yml"
  push:
    branches:
      - main
    paths:
      - "app/controllers/api/v2/**"
      - "app/models/**"
      - "config/routes.rb"
      - "script/openapi/**"
      - "lib/tasks/openapi.rake"
      - ".github/workflows/openapi-drift.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: openapi-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-pr:
    name: Check OpenAPI spec for drift
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_DATABASE: gumroad_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_URL: mysql2://root@127.0.0.1:3306/gumroad_test
      REDIS_URL: redis://127.0.0.1:6379/0
      DISABLE_SPRING: "1"
      SKIP_RSPEC: "1"
    steps:
      # Checkout the PR head ref by branch name (not SHA) so we can push commits
      # back to the same branch later. persist-credentials defaults to true,
      # which leaves the GITHUB_TOKEN-derived credentials available for git push
      # — required for the same-repo auto-regen path below.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Prepare test database
        run: bundle exec rake db:prepare
        continue-on-error: true

      - name: Detect OpenAPI drift
        id: drift
        run: |
          set +e
          bundle exec rake openapi:check > openapi-drift.log 2>&1
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ $rc -ne 0 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi
          cat openapi-drift.log
          exit 0

      - name: Upload drift log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-drift-log
          path: openapi-drift.log
          if-no-files-found: ignore
          retention-days: 14

      # ---- Same-repo PRs: auto-regenerate and push back ----

      - name: Regenerate OpenAPI spec
        id: regen
        if: steps.drift.outputs.drift_detected == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: bundle exec rake openapi:regen

      - name: Commit and push regenerated spec to PR branch
        id: autocommit
        if: steps.drift.outputs.drift_detected == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            Regenerate OpenAPI spec

            Auto-regenerated by .github/workflows/openapi-drift.yml in response
            to v2 controller/model/route/generator changes on this PR.
          file_pattern: 'docs/openapi.yaml'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Comment auto-regen success on PR
        if: steps.drift.outputs.drift_detected == 'true' && github.event.pull_request.head.repo.full_name == github.repository && steps.autocommit.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.autocommit.outputs.commit_hash }}';
            const body = [
              '### OpenAPI spec auto-regenerated',
              '',
              '`docs/openapi.yaml` was out of date relative to the v2 controllers/models/routes touched in this PR. The drift workflow ran `bundle exec rake openapi:regen` and pushed the result as `' + (sha ? sha.slice(0, 7) : 'a new commit') + '`.',
              '',
              'Please pull the new commit and re-review the regenerated spec before merging:',
              '',
              '```sh',
              'git pull',
              '```',
              '',
              '_(Note: GitHub Actions does not re-trigger CI on commits authored by `GITHUB_TOKEN`, so other checks won\'t auto-rerun against the regenerated commit. The spec is generated content and doesn\'t affect runtime, but if your PR adds tests that depend on the spec, push an empty commit to retrigger.)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ---- Fork PRs: GITHUB_TOKEN is read-only, fall back to manual-regen comment ----

      - name: Comment drift on fork PR (manual regen required)
        if: steps.drift.outputs.drift_detected == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('openapi-drift.log', 'utf8');
            const diffStart = log.indexOf('--- ');
            const diff = diffStart >= 0 ? log.slice(diffStart) : log;
            const max = 60000;
            const snippet = diff.length > max ? diff.slice(0, max) + '\n... (truncated)' : diff;
            const body = [
              '### OpenAPI drift detected — merge blocked',
              '',
              '`docs/openapi.yaml` does not match what the auto-generation pipeline would produce.',
              '',
              'This PR is from a fork, so the drift workflow can\'t push the regenerated spec back automatically (GITHUB_TOKEN is read-only on fork PRs).',
              '',
              '> **To fix:** run `bundle exec rake openapi:regen` locally and commit the regenerated `docs/openapi.yaml`.',
              '',
              '```sh',
              'bundle exec rake openapi:regen',
              'git add docs/openapi.yaml',
              'git commit -m "Regenerate OpenAPI spec"',
              'git push',
              '```',
              '',
              '<details><summary>Diff</summary>',
              '',
              '```diff',
              snippet,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job on fork PR drift (auto-regen unavailable)
        if: steps.drift.outputs.drift_detected == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::OpenAPI drift detected on a fork PR. Run 'bundle exec rake openapi:regen' locally and push docs/openapi.yaml."
          exit 1

  regen-main:
    name: Regenerate OpenAPI spec on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_DATABASE: gumroad_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_URL: mysql2://root@127.0.0.1:3306/gumroad_test
      REDIS_URL: redis://127.0.0.1:6379/0
      DISABLE_SPRING: "1"
      SKIP_RSPEC: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Prepare test database
        run: bundle exec rake db:prepare
        continue-on-error: true

      - name: Check OpenAPI spec for drift
        id: drift
        run: |
          set +e
          bundle exec rake openapi:check > openapi-drift.log 2>&1
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi
          cat openapi-drift.log
          exit 0

      - name: Regenerate OpenAPI spec
        if: steps.drift.outputs.drift_detected == 'true'
        run: bundle exec rake openapi:regen

      - name: Determine likely culprits and changed files
        id: meta
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const sh = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim();

            // Find the last commit that touched docs/openapi.yaml.
            let lastSpecCommit = '';
            try {
              lastSpecCommit = sh('git log -n 1 --pretty=format:%H -- docs/openapi.yaml');
            } catch (_) {}

            const range = lastSpecCommit ? `${lastSpecCommit}..HEAD` : 'HEAD~20..HEAD';

            // Commits in range that touched generator inputs.
            let commits = '';
            try {
              commits = sh(`git log ${range} --pretty=format:'- %h %s (%an)' -- app/controllers/api/v2 app/models config/routes.rb script/openapi lib/tasks/openapi.rake`);
            } catch (_) {}

            // Files in range that touched generator inputs.
            let files = '';
            try {
              files = sh(`git log ${range} --name-only --pretty=format: -- app/controllers/api/v2 app/models config/routes.rb script/openapi lib/tasks/openapi.rake | sort -u | sed '/^$/d'`);
            } catch (_) {}

            // Files actually changed by the regen.
            let changed = '';
            try {
              changed = sh('git status --porcelain');
            } catch (_) {}

            const changedFiles = changed
              .split('\n')
              .map((l) => l.trim().replace(/^\S+\s+/, ''))
              .filter(Boolean);

            const onlySpecChanged =
              changedFiles.length > 0 &&
              changedFiles.every((f) => f === 'docs/openapi.yaml');

            core.setOutput('only_spec_changed', onlySpecChanged ? 'true' : 'false');
            core.setOutput('range', range);
            core.setOutput('commits', commits || '_(none detected)_');
            core.setOutput('files', files || '_(none detected)_');
            core.setOutput('changed_files', changedFiles.join('\n') || '_(none)_');

      - name: Open auto-PR with regenerated spec
        if: steps.drift.outputs.drift_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/openapi-regen-${{ github.run_id }}
          base: main
          commit-message: |
            Regenerate OpenAPI spec for upstream main

            Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: Regenerate OpenAPI spec for upstream main
          body: |
            `bundle exec rake openapi:check` failed on `main` after the most recent push, so this PR regenerates `docs/openapi.yaml` to match the current generator output.

            This usually means a PR landed without running through the OpenAPI drift check (workflow bypassed, paths filter missed it, or the generator itself changed).

            ### Likely culprits

            Commits in `${{ steps.meta.outputs.range }}` that touched generator inputs:

            ${{ steps.meta.outputs.commits }}

            Files touched in that range:

            ```
            ${{ steps.meta.outputs.files }}
            ```

            ### Files changed by this regeneration

            ```
            ${{ steps.meta.outputs.changed_files }}
            ```

            ### How this was generated

            ```sh
            bundle exec rake openapi:regen
            ```

            See `lib/tasks/openapi.rake` and `script/openapi/README.md` for pipeline details.
          labels: ${{ steps.meta.outputs.only_spec_changed == 'true' && 'auto-merge' || '' }}
          delete-branch: true

      - name: Fail job if drift could not be auto-resolved
        if: failure() && steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "::error::OpenAPI drift detected on main but auto-PR failed. Run 'bundle exec rake openapi:regen' locally."
          exit 1
