  "/v2/tax_forms":
    get:
      summary: index
      tags:
      - Api::V2::TaxForm
      responses:
        '200':
          description: does not return tax forms belonging to other sellers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tax_forms:
                    type: array
                    items:
                      type: object
                      properties:
                        tax_year:
                          type: integer
                        tax_form_type:
                          type: string
                        filed_at:
                          nullable: true
                          type: string
                      required:
                      - tax_year
                      - tax_form_type
                      - filed_at
                required:
                - success
                - tax_forms
              example:
                success: true
                tax_forms: []
        '401':
          description: errors out if you aren't authenticated
          content:
            text/html:
              schema:
                type: string
              example: ''
        '403':
          description: returns 403 when seller is not US-based
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                - success
                - message
              example:
                success: false
                message: Tax center is not enabled for this account.
            text/html:
              schema:
                type: string
              example: ''
        '404':
          description: returns 404 when the year is before the seller account-creation
            year
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                - success
                - message
              example:
                success: false
                message: Tax forms are not available for 2021.
      parameters:
      - name: access_token
        in: query
        required: false
        schema:
          type: string
        example: SdKPOHvz28zTlbov3RhAMudKHHNQCfz7f3FqJ8SSsrE
      - name: year
        in: query
        required: false
        schema:
          oneOf:
          - type: integer
          - type: array
            items:
              type: string
        example: 2021
  "/v2/tax_forms/{year}/{tax_form_type}/download":
    get:
      summary: download
      tags:
      - Api::V2::TaxForm
      parameters:
      - name: access_token
        in: query
        required: false
        schema:
          type: string
        example: NSojRDc5SvryB2s_5BLCx3HtBrcp0twLVX3M8miNhhg
      - name: tax_form_type
        in: path
        required: true
        schema:
          type: string
        example: us_1099_k
      - name: year
        in: path
        required: true
        schema:
          type: integer
        example: 2025
      responses:
        '200':
          description: proxies the S3 fallback bytes when Stripe returns nil for 1099-K
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: errors out if you aren't authenticated
          content:
            text/html:
              schema:
                type: string
              example: ''
        '403':
          description: returns 403 when tax_center is not enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                - success
                - message
              example:
                success: false
                message: Tax center is not enabled for this account.
            text/html:
              schema:
                type: string
              example: ''
        '404':
          description: returns 404 when the stored stripe_account_id does not belong
            to the seller
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                - success
                - message
              example:
                success: false
                message: Tax form not found.
