  "/v2/resource_subscriptions":
    get:
      summary: index
      tags:
      - Api::V2::ResourceSubscription
      parameters:
      - name: access_token
        in: query
        required: false
        schema:
          type: string
        example: 9R4ZrL8o0PANyIsppBEaI0c3kMczIOz1OWe1DxvcmNI
      - name: resource_name
        in: query
        required: false
        schema:
          type: string
        example: sale
      responses:
        '200':
          description: grants access with the account scope
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  resource_subscriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        resource_name:
                          type: string
                        post_url:
                          type: string
                      required:
                      - id
                      - resource_name
                      - post_url
                required:
                - success
              example:
                success: true
                message: Valid resource_name parameter required
                resource_subscriptions: []
        '403':
          description: does not allow the request if the app doesn't have view_sales
            scope
          content:
            text/html:
              schema:
                type: string
              example: ''
    put:
      summary: create
      tags:
      - Api::V2::ResourceSubscription
      responses:
        '200':
          description: responds with an error JSON message for a localhost post URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  resource_subscription:
                    type: object
                    properties:
                      id:
                        type: string
                      resource_name:
                        type: string
                      post_url:
                        type: string
                    required:
                    - id
                    - resource_name
                    - post_url
                  message:
                    type: string
                required:
                - success
              example:
                success: false
                resource_subscription:
                  id: M1DNZ2kmiK18jZgn6aiJ3w==
                  resource_name: dispute_won
                  post_url: http://example.com
                message: Invalid post URL 'http://localhost/path'
        '403':
          description: does not allow the subscription if the app doesn't have view_sales
            scope
          content:
            text/html:
              schema:
                type: string
              example: ''
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                post_url:
                  type: string
                resource_name:
                  type: string
              required:
              - access_token
              - resource_name
            example:
              access_token: xkfaPBYWM6nL7Oa7QuF7UjO2_36T757t2cQ1yZCI6XA
              post_url: http://localhost/path
              resource_name: sale
