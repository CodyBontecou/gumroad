components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: |
        Doorkeeper-managed OAuth2. Authorization Code and Client Credentials grants
        are supported. See https://gumroad.com/api for app registration and the
        full scope list.
      flows:
        authorizationCode:
          authorizationUrl: https://gumroad.com/oauth/authorize
          tokenUrl: https://gumroad.com/oauth/token
          refreshUrl: https://gumroad.com/oauth/token
          scopes:
            view_public: Read public profile data (default)
            edit_products: Create, update, and delete products
            view_sales: Read sales and subscribers
            mark_sales_as_shipped: Mark sales as shipped
            edit_sales: Edit sales (e.g. resend receipt)
            refund_sales: Refund sales
            view_payouts: Read payouts
            view_profile: Read user profile
            view_tax_data: Read tax forms / earnings
            ifttt: IFTTT integration
        clientCredentials:
          tokenUrl: https://gumroad.com/oauth/token
          scopes:
            view_public: Read public profile data
            edit_products: Create, update, and delete products
            view_sales: Read sales and subscribers
            mark_sales_as_shipped: Mark sales as shipped
            edit_sales: Edit sales
            refund_sales: Refund sales
            view_payouts: Read payouts
            view_profile: Read user profile
            view_tax_data: Read tax forms / earnings
    bearerAuth:
      type: http
      scheme: bearer
    accessTokenQuery:
      type: apiKey
      in: query
      name: access_token
  schemas:
    SuccessEnvelope:
      type: object
      description: Standard success wrapper. Real responses extend this with additional payload keys.
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
    ErrorResponse:
      type: object
      description: >-
        Standard error envelope. Note: the API often returns errors with HTTP 200 status; the `success`
        flag is the source of truth.
      properties:
        success:
          type: boolean
          enum:
          - false
        message:
          type: string
      required:
      - success
      - message
    Pagination:
      type: object
      properties:
        next_page_url:
          type:
          - string
          - 'null'
        next_page_key:
          type:
          - string
          - 'null'
    User:
      type: object
      properties:
        name: {}
        bio: {}
        currency_type:
          type: string
        profile_url:
          type: string
        email:
          type: string
        display_name:
          type: string
      description: Authenticated user.
      required:
      - name
      - bio
    Product:
      type: object
      description: >-
        Product (alias for Link). Different OAuth scopes return different field subsets — see oneOf for
        scope-specific fields.
      properties:
        name: {}
        description: {}
        require_shipping: {}
        preview_url:
          type: string
        id:
          type: string
        external_id:
          type: string
        price:
          type: integer
          description: Price in the smallest currency unit (cents).
        currency:
          type: string
        short_url:
          type: string
          format: uri
        formatted_price: {}
        recommendable:
          type: boolean
        rated_as_adult:
          type: boolean
        hide_sold_out_variants:
          type: boolean
        custom_delivery_url:
          type: string
        is_preorder:
          type: boolean
        is_in_preorder_state:
          type: boolean
        release_at:
          type: string
        url:
          format: uri
        thumbnail_url:
          type: string
          format: uri
        tags: {}
        published:
          type: boolean
        file_info: {}
        max_purchase_count:
          type: integer
        deleted:
          type: boolean
        custom_fields: {}
        custom_summary: {}
        is_tiered_membership:
          type: boolean
        recurrences: {}
        covers: {}
        main_cover_id:
          type: string
        bundle_products: {}
        variants: {}
        rich_content: {}
        has_same_rich_content_for_all_variants:
          type: boolean
        files: {}
        purchasing_power_parity_prices: {}
        sales_count:
          type: integer
        sales_usd_cents:
          type: integer
      required:
      - name
      - description
      - require_shipping
      - preview_url
      - id
      - external_id
      - price
      - currency
      - short_url
      - formatted_price
      - recommendable
      - rated_as_adult
      - hide_sold_out_variants
      - custom_delivery_url
      - url
      - thumbnail_url
      - tags
      - published
      - file_info
      - max_purchase_count
      - deleted
      - custom_fields
      - custom_summary
      - is_tiered_membership
      - recurrences
      - covers
      - main_cover_id
      - bundle_products
      - variants
      oneOf:
      - title: as_json_for_api
        type: object
        properties:
          rich_content: {}
          has_same_rich_content_for_all_variants:
            type: boolean
          files: {}
          is_preorder:
            type: boolean
          is_in_preorder_state:
            type: boolean
          release_at:
            type: string
          purchasing_power_parity_prices: {}
      - title: as_json_variant_details_only
        type: object
        properties:
          skus_title: {}
    Sale:
      type: object
      properties:
        id: {}
        email:
          type: string
        seller_id:
          type: string
        timestamp:
          type: string
        daystamp: {}
        created_at:
          type: string
        link_name:
          type: string
        product_name:
          type: string
        product_has_variants: {}
        price: {}
        gumroad_fee:
          type: integer
        is_bundle_purchase:
          type: boolean
        is_bundle_product_purchase:
          type: boolean
        card:
          type: object
        paypal_email:
          type: string
        product_rating: {}
        reviews_count:
          type: integer
        average_rating: {}
        subscription_id:
          type: string
        cancelled:
          type: boolean
        dead: {}
        ended:
          type: boolean
        free_trial_ended:
          type: boolean
        free_trial_ends_on:
          type: string
        recurring_charge: {}
        preorder_cancelled:
          type: boolean
        is_preorder_authorization:
          type: boolean
        is_in_preorder_state:
          type: boolean
        shipped:
          type: boolean
        tracking_url:
          type: string
        offer_code:
          type: object
        affiliate:
          type: object
        discover_fee_percentage: {}
        receipt_url:
          type: string
        can_ping:
          type: boolean
        sku_id:
          type: string
        sku_external_id:
          type: string
        formatted_shipping_amount: {}
        quantity: {}
        message: {}
      description: 'Sale. Backed by Purchase#as_json(version: 2). Many fields are scope-conditional —
        see oneOf.'
      required:
      - id
      - email
      - seller_id
      - timestamp
      - daystamp
      - created_at
      - link_name
      - product_name
      - product_has_variants
      - price
      - gumroad_fee
      - is_bundle_purchase
      - is_bundle_product_purchase
      - card
      - product_rating
      - quantity
      oneOf:
      - title: WithCreatorAppFields
        type: object
        properties:
          paypal_email:
            type: string
          reviews_count:
            type: integer
          average_rating: {}
          subscription_id:
            type: string
          cancelled:
            type: boolean
          dead: {}
          ended:
            type: boolean
          free_trial_ended:
            type: boolean
          free_trial_ends_on:
            type: string
          recurring_charge: {}
          preorder_cancelled:
            type: boolean
          is_preorder_authorization:
            type: boolean
          is_in_preorder_state:
            type: boolean
          shipped:
            type: boolean
          tracking_url:
            type: string
          offer_code:
            type: object
          affiliate:
            type: object
          discover_fee_percentage: {}
          receipt_url:
            type: string
          can_ping:
            type: boolean
          sku_id:
            type: string
          sku_external_id:
            type: string
          formatted_shipping_amount: {}
          message: {}
    Subscriber:
      type: object
      properties:
        id:
          type: string
        email: {}
        created_at:
          type: string
        source: {}
        formatted_confirmed_on:
          type: string
        can_update:
          type: boolean
      description: Subscriber to a creator's mailing list. Backed by Follower#as_json.
      required:
      - id
      - email
      - created_at
      - source
      - formatted_confirmed_on
      - can_update
    OfferCode:
      type: object
      properties:
        id:
          type: string
        name: {}
        max_purchase_count:
          type: integer
        universal:
          type: boolean
        times_used: {}
        percent_off: {}
        amount_cents:
          type: integer
      description: Discount/offer code. Mutually exclusive percent_off vs amount_cents — see oneOf.
      required:
      - id
      - name
      - max_purchase_count
      - universal
      - times_used
      oneOf:
      - title: PercentOff
        type: object
        properties:
          percent_off:
            type: integer
        required:
        - percent_off
      - title: AmountOff
        type: object
        properties:
          amount_cents:
            type: integer
        required:
        - amount_cents
    Variant:
      type: object
      properties:
        is_customizable_price:
          type: boolean
        recurrence_price_values: {}
      description: >-
        Product variant. Many fields are scope-conditional (rendered only when for_views: true and/or
        for_seller: true) — see oneOf.
      oneOf:
      - title: ForViews
        type: object
        properties:
          option: {}
          name: {}
          description: {}
          id:
            type: string
          max_purchase_count:
            type: integer
          price_difference_cents:
            type: integer
          price_difference_in_currency_units: {}
          showing: {}
          quantity_left: {}
          amount_left_title: {}
          displayable: {}
          sold_out: {}
          price_difference: {}
          currency_symbol: {}
          product_files_ids:
            type: array
            items:
              type: object
          integrations:
            type: object
      - title: ForSeller
        type: object
        properties:
          active_subscriber_count:
            type: integer
          settings:
            type: object
    VariantCategory:
      type: object
      properties: {}
      description: Variant category — a grouping of variants (e.g., 'Size', 'Color').
    CustomField:
      type: object
      properties:
        id:
          type: string
        type: {}
        name: {}
        required: {}
        global: {}
        collect_per_product: {}
        products: {}
      description: Custom checkout field on a product.
      required:
      - id
      - type
      - name
      - required
      - global
      - collect_per_product
      - products
    Sku:
      type: object
      properties:
        custom_sku: {}
      description: Product SKU.
      oneOf:
      - title: WithCustomSku
        type: object
        properties:
          custom_sku: {}
    Payout:
      type: object
      properties:
        id:
          type: string
        amount: {}
        currency: {}
        status: {}
        created_at:
          type: string
        processed_at:
          type: string
        payment_processor: {}
        bank_account_visual: {}
        paypal_email:
          type: string
        sales: {}
        refunded_sales: {}
        disputed_sales: {}
        transactions: {}
      description: Payout (creator payment).
      required:
      - id
      - amount
      - currency
      - status
      - created_at
      - processed_at
      - payment_processor
      - bank_account_visual
      - paypal_email
    License:
      type: object
      properties:
        product_name:
          type: string
        email: {}
        subscription_ended_at:
          type: string
        subscription_cancelled_at:
          type: string
        subscription_failed_at:
          type: string
        chargebacked:
          type: boolean
        refunded: {}
      description: License-scoped purchase view returned by /licenses/verify.
      required:
      - product_name
      - email
    AssetPreview:
      type: object
      properties:
        url: {}
        original_url:
          type: string
        thumbnail:
          type: string
        id: {}
        type:
          type: string
        filetype: {}
        width: {}
        height: {}
        native_width: {}
        native_height: {}
      description: Asset preview / cover image attached to a product.
      required:
      - url
      - original_url
      - thumbnail
      - id
      - type
      - filetype
      - width
      - height
      - native_width
      - native_height
    MessageEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    ErrorMessage:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - false
        message:
          type: string
        status:
          type: integer
        error:
          type: string
    UserEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - type: object
        properties:
          user:
            type: object
            additionalProperties: true
    ProductEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - type: object
        properties:
          product:
            "$ref": "#/components/schemas/Product"
          warning:
            type: string
    ProductListEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - "$ref": "#/components/schemas/Pagination"
      - type: object
        properties:
          products:
            type: array
            items:
              "$ref": "#/components/schemas/Product"
    ProductCreate:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        native_type:
          type: string
          default: digital
          description: e.g. digital, ebook, course, membership, bundle, coffee, commission.
        description:
          type: string
        custom_permalink:
          type: string
        price:
          type: integer
          description: Price in cents.
        price_currency_type:
          type: string
          example: usd
        max_purchase_count:
          type: integer
        customizable_price:
          type: boolean
        suggested_price_cents:
          type: integer
        subscription_duration:
          type: string
          description: Required for membership products. e.g. monthly, yearly.
        taxonomy_id:
          type: string
        tags:
          type: array
          items:
            type: string
        custom_summary:
          type: string
        files:
          type: array
          items:
            "$ref": "#/components/schemas/FileInput"
        rich_content:
          type: array
          items:
            "$ref": "#/components/schemas/RichContentPage"
    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        custom_permalink:
          type: string
        price:
          type: integer
        price_currency_type:
          type: string
        customizable_price:
          type: boolean
        suggested_price_cents:
          type: integer
        max_purchase_count:
          type: integer
        quantity_enabled:
          type: boolean
        is_adult:
          type: boolean
        display_product_reviews:
          type: boolean
        should_show_sales_count:
          type: boolean
        taxonomy_id:
          type: string
        custom_receipt:
          type: string
        custom_summary:
          type: string
        has_same_rich_content_for_all_variants:
          type: boolean
        tags:
          type: array
          items:
            type: string
        cover_ids:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            "$ref": "#/components/schemas/FileInput"
          description: |
            Full replacement. Include an entry with `id` only to keep an existing file unchanged;
            files missing from the array are removed.
        rich_content:
          type: array
          items:
            "$ref": "#/components/schemas/RichContentPage"
    FileInput:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
          description: Canonical URL returned by `POST /files/complete`.
        display_name:
          type: string
        extension:
          type: string
        position:
          type: integer
        stream_only:
          type: boolean
        description:
          type: string
    RichContentPage:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          oneOf:
          - type: array
            items:
              type: object
              additionalProperties: true
          - type: object
            additionalProperties: true
    VariantInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price_difference_cents:
          type: integer
        max_purchase_count:
          type: integer
    OfferCodeCreate:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Code (what the buyer types).
        offer_type:
          type: string
          enum:
          - cents
          - percent
          default: cents
        amount_off:
          type: integer
          description: Cents (when offer_type=cents) or percent (when offer_type=percent).
        amount_cents:
          type: integer
        max_purchase_count:
          type: integer
        universal:
          type: boolean
          default: false
    SaleEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - type: object
        properties:
          sale:
            "$ref": "#/components/schemas/Sale"
    SaleListEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - "$ref": "#/components/schemas/Pagination"
      - type: object
        properties:
          sales:
            type: array
            items:
              "$ref": "#/components/schemas/Sale"
    PayoutListEnvelope:
      allOf:
      - "$ref": "#/components/schemas/SuccessEnvelope"
      - "$ref": "#/components/schemas/Pagination"
      - type: object
        properties:
          payouts:
            type: array
            items:
              "$ref": "#/components/schemas/Payout"
    LicenseLookup:
      type: object
      required:
      - license_key
      properties:
        product_id:
          type: string
        license_key:
          type: string
